<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
  <div class="box">
    <h2>Sign Up</h2>
    <form method="POST">
      <input name="username" placeholder="Username" required>
      <input name="password" type="password" required>
      <button>Create</button>
    </form>
    <a href="/login">Back to login</a>
  </div>
</body>
</html>
