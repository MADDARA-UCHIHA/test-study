<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Darkline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #00f2ff; }
        .cyber-box { backdrop-filter: blur(10px); border: 1px solid #00f2ff33; box-shadow: 0 0 20px #00f2ff22; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="cyber-box w-full max-w-md bg-black/60 p-8 rounded-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center tracking-widest uppercase">Sign Up</h2>
        
        <form action="/signup" method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="relative">
                <input type="email" name="email" placeholder="Email" required 
                    class="w-full bg-transparent border-b-2 border-gray-700 p-3 focus:border-cyan-400 outline-none transition-all placeholder-gray-500">
            </div>

            <div class="relative">
                <input type="password" name="password" placeholder="Password" required 
                    class="w-full bg-transparent border-b-2 border-gray-700 p-3 focus:border-cyan-400 outline-none transition-all placeholder-gray-500">
            </div>

            <button type="submit" 
                class="w-full bg-cyan-600 hover:bg-cyan-400 text-black font-bold py-3 rounded-lg transition-all shadow-[0_0_15px_rgba(6,182,212,0.5)] active:scale-95">
                CREATE ACCOUNT
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/login" class="text-sm text-gray-400 hover:text-cyan-300 transition-colors">
                Already have an account? <span class="underline">Login</span>
            </a>
        </div>
    </div>
</body>
</html>
