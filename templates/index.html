<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKLINE ● NEWS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background:#000; color:#0f0; font-family:'Courier New', monospace; margin:0; }
        header { border-bottom:2px solid #0f0; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.9); position:sticky; top:0; z-index:100; }
        
        /* Full Read Card (Modal) */
        #fullReadModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:1000; }
        .intel-card { width:90%; max-width:850px; margin:5% auto; background:#050505; border:1px solid #0f0; padding:30px; color:#0f0; box-shadow:0 0 25px #0f0; max-height:85vh; overflow-y:auto; position: relative; }
        
        .btn-neon { background:none; border:1px solid #0f0; color:#0f0; padding:10px 20px; cursor:pointer; font-weight:bold; transition:0.3s; margin-bottom: 15px; }
        .btn-neon:hover { background:#0f0; color:#000; box-shadow:0 0 15px #0f0; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #f03; cursor: pointer; border: none; background: none; }
        
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:25px; padding:30px; }
        .card { border:1px solid #111; background:#050505; padding: 15px; display:flex; flex-direction:column; }
        .card-img { width:100%; height:180px; object-fit:cover; border-bottom:1px solid #0f0; }
    </style>
</head>
<body>

<header class="flex flex-col md:flex-row items-center justify-between p-4 border-b border-green-500 bg-black/90 sticky top-0 z-50">
    <h1 class="text-green-500 text-xl font-bold tracking-[0.3em]">DARKLINE ● NEWS</h1>
    <div class="flex items-center gap-4 mt-3 md:mt-0">
        <div class="text-right">
            <p class="text-[9px] text-gray-500 uppercase tracking-tighter">System ID: <span class="text-green-400 font-mono">{{ user }}</span></p>
            <p class="text-[9px] text-gray-500 uppercase tracking-tighter">Access Level: <span class="text-white font-bold">{{ tier | upper }}</span></p>
        </div>
        
        <button onclick="location.href='/premium'" 
            class="bg-gradient-to-r from-yellow-600 to-yellow-400 text-black text-[10px] font-black px-4 py-1.5 rounded-sm uppercase italic hover:scale-105 transition-transform shadow-[0_0_15px_rgba(250,204,21,0.4)]">
            GO PREMIUM
        </button>
    </div>
</header>
<main id="grid" class="grid">
    <h3 style="text-align:center; grid-column:1/-1;">FETCHING DATA STREAMS...</h3>
</main>

<div id="fullReadModal">
    <div class="intel-card">
        <button class="close-icon" onclick="closeIntel()">&times;</button>
        <h2 id="mTitle" style="border-bottom:1px solid #0f0; padding-bottom:10px; margin-top: 0;">NEURAL INTERFACE</h2>
        
        <div style="padding: 15px 0; border-bottom: 1px dashed #1a1a1a; margin-bottom: 15px;">
            <button class="btn-neon" id="speakBtn" style="margin-bottom: 0;">
                <i class="fa-solid fa-volume-high"></i> LISTEN INTEL (AI VOICE)
            </button>
        </div>

        <div id="mBody" style="line-height:1.7; font-size: 1.1rem; white-space: pre-wrap;">>> AWAITING INTEL...</div>
        
        <div style="display:flex; gap:15px; border-top: 1px solid #1a1a1a; padding-top: 15px; margin-top: 20px;">
            <button class="btn-neon" onclick="closeIntel()" style="margin-bottom: 0;">DISMISS</button>
        </div>
    </div>
</div>

<script>
    let activeIntel = "";

    async function loadFeed() {
        const grid = document.getElementById('grid');
        try {
            const res = await fetch('/api/feed');
            const data = await res.json();
            grid.innerHTML = data.articles.map(a => `
                <div class="card">
                    <img src="${a.image}" class="card-img">
                    <h3 style="font-size: 16px; margin: 15px 0; color: #fff;">${a.title}</h3>
                    <button class="btn-neon" onclick="readFullIntel('${a.full_link}', '${a.title.replace(/'/g, "\\'")}')">READ FULL</button>
                </div>
            `).join('');
        } catch (e) { grid.innerHTML = "!! SYSTEM OFFLINE !!"; }
    }

    async function readFullIntel(url, title) {
        const modal = document.getElementById('fullReadModal');
        const body = document.getElementById('mBody');
        document.getElementById('mTitle').innerText = title;
        modal.style.display = 'block';
        body.innerHTML = ">> DECRYPTING FULL INTEL FROM SOURCE...";

        try {
            const res = await fetch('/api/full-intel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': "{{ csrf_token() }}"},
                body: JSON.stringify({url: url})
            });
            const data = await res.json();
            activeIntel = data.content;
            body.innerHTML = data.content;
            
            document.getElementById('speakBtn').onclick = () => speakIntel(activeIntel);
        } catch (e) { body.innerHTML = "!! DATA EXTRACTION FAILED !!"; }
    }

    function speakIntel(text) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'en-US';
        speech.rate = 0.95;
        window.speechSynthesis.speak(speech);
    }

    function closeIntel() {
        window.speechSynthesis.cancel();
        document.getElementById('fullReadModal').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', loadFeed);
</script>
</body>
</html>
